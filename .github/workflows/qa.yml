name: QA
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-and-playthrough:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: node build.js
      - run: node test/smoke.js
      - run: node test/harness.js
